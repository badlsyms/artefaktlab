<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Prémiový personalizovaný AI asistent." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Můj Nucleus</title>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">NUCLEUS 2.0</p>
        <h1>Můj Nucleus</h1>
      </div>
      <div id="status" class="status">Připojuji…</div>
    </header>

    <section id="chat" class="chat" aria-live="polite">
      <article class="message assistant">
        <div class="avatar">N</div>
        <div class="bubble">Jsem Nucleus. Nápad dovnitř, použitelný výsledek ven. Co dnes posuneme?</div>
      </article>
    </section>

    <form id="composer" class="composer">
      <textarea id="message" rows="1" maxlength="12000" placeholder="Napiš Nucleusu…" required></textarea>
      <button id="send" type="submit">Odeslat</button>
    </form>

    <details class="settings">
      <summary>Nastavení</summary>
      <label>PIN Nucleusu <input id="pin" type="password" autocomplete="off" /></label>
      <button id="clear" type="button">Vymazat místní historii</button>
      <pre id="diagnostics"></pre>
    </details>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
